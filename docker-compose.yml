version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: be-modami-user-service
      POSTGRES_USER: modami
      POSTGRES_PASSWORD: modami
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modami -d be-modami-user-service"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
