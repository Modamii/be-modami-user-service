app:
  name: "be-modami-user-service"
  version: "1.0.0"
  environment: "local"
  debug: false
  port: 8086
  host: "0.0.0.0"
  swagger_host: "localhost:8086"
  shutdown_timeout: "30s"
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "120s"
  allow_credentials: true
  allowed_origins:
    - "http://localhost:5173"
    - "http://localhost:3000"
    - "http://localhost:8080"
    - "http://localhost:8081"

grpc:
  port: "50050"

postgres:
  host: "localhost"
  port: 5432
  schema: public
  user_reader: "postgres"
  password_reader: "postgres_password"
  user_writer: "postgres"
  password_writer: "postgres_password"
  database: "be-modami-user-service"
  sslmode: "disable"
  max_idle_conns: 5
  max_active_conns: 25
  max_conn_timeout: 10m
  debug_log: false

redis:
  host: "localhost"
  port: 6379
  database: 0
  rate_limit_database: 5
  ttl: 259200s
  pool_size: 100
  pass: "password"
  user_name: "username"
  write_timeout: 600s
  read_timeout: 600s
  dial_timeout: 600s
  tls_config:
    insecure_skip_verify: true

kafka:
  broker_list: "localhost:9092"
  enable: true
  tls_enable: false
  partition: 1
  partitioner: "random"
  sasl_producer_username: ""
  sasl_producer_password: ""
  sasl_consumer_username: ""
  sasl_consumer_password: ""
  user_activated_topic_name: "modami.auth.user.activated"
  consumer_group: "user-service-group"
  client_id: "user-service"
  env: "local"

keycloak:
  jwks_url: "http://localhost:8180/realms/modami/protocol/openid-connect/certs"

observability:
  service_name: "user-service"
  service_version: "1.0.0"
  environment: "local"
  log_level: "debug"
  otlp_endpoint: ""
  otlp_insecure: true
