      shop_description:
        maxLength: 1000
        type: string
      shop_logo_url:
        type: string
      shop_name:
        maxLength: 255
        minLength: 3
        type: string
      tax_id:
        type: string
    type: object
  github_com_modami_user-service_internal_dto.UpdateStatusRequest:
    properties:
      reason:
