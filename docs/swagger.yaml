      label:
        type: string
      phone:
        type: string
      postal_code:
        type: string
      province:
        type: string
      recipient_name:
        type: string
      ward:
        type: string
    type: object
  github_com_modami_user-service_internal_dto.CreateAddressRequest:
    properties:
      address_line_1:
        maxLength: 512
        type: string
      address_line_2:
        maxLength: 512
        type: string
      country:
        maxLength: 64
        type: string
      district:
        maxLength: 128
        type: string
      is_default:
        type: boolean
      label:
        maxLength: 50
        type: string
      phone:
        type: string
      postal_code:
        maxLength: 20
        type: string
      province:
        maxLength: 128
        type: string
      recipient_name:
        maxLength: 255
        type: string
      ward:
        maxLength: 128
        type: string
    required:
    - address_line_1
    - label
    - phone
    - recipient_name
    type: object
  github_com_modami_user-service_internal_dto.CreateReviewRequest:
    properties:
      comment:
        maxLength: 1000
        type: string
      is_anonymous:
        type: boolean
      order_id:
        type: string
      rating:
        maximum: 5
        minimum: 1
        type: integer
    required:
    - order_id
    - rating
    type: object
  github_com_modami_user-service_internal_dto.FollowListResponse:
    properties:
      cursor:
        type: string
      users:
        items:
          $ref: '#/definitions/github_com_modami_user-service_internal_dto.FollowUserItem'
        type: array
    type: object
  github_com_modami_user-service_internal_dto.FollowStatusResponse:
    properties:
      is_following:
        type: boolean
    type: object
  github_com_modami_user-service_internal_dto.FollowUserItem:
    properties:
      avatar_url:
        type: string
      followed_at:
        type: string
      full_name:
        type: string
      id:
        type: string
    type: object
  github_com_modami_user-service_internal_dto.KYCDocumentInput:
    properties:
      doc_type:
        enum:
        - id_card_front
        - id_card_back
        - business_license
        - selfie_with_id
