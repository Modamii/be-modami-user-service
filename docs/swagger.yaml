      business_type:
        type: string
      created_at:
        type: string
      kyc_status:
        type: string
      shop_banner_url:
        type: string
      shop_description:
        type: string
      shop_logo_url:
        type: string
      shop_name:
        type: string
      shop_slug:
        type: string
      total_reviews:
        type: integer
      user_id:
        type: string
    type: object
  github_com_modami_user-service_internal_dto.SubmitKYCRequest:
    properties:
      documents:
        items:
          $ref: '#/definitions/github_com_modami_user-service_internal_dto.KYCDocumentInput'
        minItems: 1
