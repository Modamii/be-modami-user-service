basePath: /v1/user-services
definitions:
  apperror.Code:
    enum:
    - BAD_REQUEST
    - UNAUTHORIZED
    - FORBIDDEN
    - NOT_FOUND
    - METHOD_NOT_ALLOWED
    - NOT_ACCEPTABLE
    - REQUEST_TIMEOUT
    - CONFLICT
    - GONE
    - PRECONDITION_FAILED
    - PAYLOAD_TOO_LARGE
    - UNSUPPORTED_MEDIA_TYPE
    - VALIDATION_ERROR
    - UNPROCESSABLE_ENTITY
    - LOCKED
