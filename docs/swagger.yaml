      count_2:
        type: integer
      count_3:
        type: integer
      count_4:
        type: integer
      count_5:
        type: integer
      total_reviews:
        type: integer
      user_id:
        type: string
    type: object
  github_com_modami_user-service_internal_dto.RegisterSellerRequest:
    properties:
      bank_account:
        type: string
      bank_name:
        maxLength: 128
        type: string
      business_type:
        enum:
        - individual
        - business
        type: string
      shop_description:
        maxLength: 1000
        type: string
      shop_name:
        maxLength: 255
        minLength: 3
        type: string
      shop_slug:
        maxLength: 255
        minLength: 3
        type: string
      tax_id:
        type: string
    required:
    - business_type
    - shop_name
    - shop_slug
    type: object
  github_com_modami_user-service_internal_dto.RejectKYCRequest:
    properties:
