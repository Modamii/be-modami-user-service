    - PRECONDITION_REQUIRED
    - TOO_MANY_REQUESTS
    - INTERNAL_ERROR
    - NOT_IMPLEMENTED
    - BAD_GATEWAY
    - SERVICE_UNAVAILABLE
    - TIMEOUT
    - CACHE_MISS
    - CACHE_ERROR
    - MESSAGE_BUS_ERROR
    type: string
    x-enum-varnames:
    - CodeBadRequest
    - CodeUnauthorized
    - CodeForbidden
    - CodeNotFound
    - CodeMethodNotAllowed
    - CodeNotAcceptable
    - CodeRequestTimeout
    - CodeConflict
    - CodeGone
    - CodePrecondFailed
    - CodePayloadTooLarge
    - CodeUnsupportedMedia
    - CodeValidation
    - CodeUnprocessable
    - CodeLocked
    - CodeFailedDependency
    - CodePrecondRequired
    - CodeTooManyRequest
    - CodeInternal
    - CodeNotImplemented
    - CodeBadGateway
    - CodeServiceUnavail
    - CodeTimeout
    - CodeCacheMiss
    - CodeCacheError
    - CodeMessageBus
  github_com_modami_user-service_internal_dto.AddressResponse:
    properties:
      address_line_1:
        type: string
