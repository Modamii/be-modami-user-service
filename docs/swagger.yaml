        type: string
    required:
    - cover_url
    type: object
  github_com_modami_user-service_internal_dto.UpdateProfileRequest:
    properties:
      bio:
        maxLength: 500
        type: string
      date_of_birth:
        type: string
      full_name:
        maxLength: 255
        minLength: 1
